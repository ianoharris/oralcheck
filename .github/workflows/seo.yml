name: SEO Content Pipeline

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: oralcheck-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install anthropic httpx python-dotenv

      - name: Generate SEO article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python seo_pipeline.py

      - name: Commit article and keyword state
        working-directory: .
        run: |
          git config user.name "OralCheck Bot"
          git config user.email "bot@oralcheck.org"
          git add content/drafts/ oralcheck-agent/seo_keywords.json
          git diff --staged --quiet || (git commit -m "content: add SEO draft article [skip ci]" && git push)
