name: Outreach Follow-up Tracker

on:
  schedule:
    - cron: '0 12 * * 0'  # Every Sunday at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-followups:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic httpx python-dotenv google-api-python-client google-auth
      - name: Check outreach and draft follow-ups
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oralcheck-agent/outreach_tracker.py
      - name: Commit drafts
        run: |
          git config user.name "OralCheck Bot"
          git config user.email "bot@oralcheck.org"
          git add outreach-drafts/
          git diff --staged --quiet || (git commit -m "outreach: add follow-up drafts [skip ci]" && git push)
