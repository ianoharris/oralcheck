name: OralCheck Idea Flow

# Hands-off from your phone:
#   1. Researches the web and sends a numbered idea batch to Telegram
#   2. Waits for your reply naming the numbers you want (e.g. "1, 3, 8")
#   3. Generates those posts and sends each back as a swipeable deck to approve
#   4. Posts approved decks to Instagram
on:
  workflow_dispatch:
    inputs:
      count:
        description: 'How many ideas to suggest'
        required: false
        default: '8'

permissions:
  contents: write

jobs:
  ideas:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # two approval windows; plenty of slack

    defaults:
      run:
        working-directory: oralcheck-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        working-directory: .
        run: sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install anthropic httpx pillow python-dotenv playwright

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Verify render + content logic
        run: python test_render.py && python test_content.py

      - name: Suggest ideas (sends to Telegram)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oralcheck_agent.py --ideas ${{ inputs.count || '8' }}

      - name: Await your pick, then generate the posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oralcheck_agent.py --await-picks

      - name: Review and post the picked batch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLORA_API_KEY: ${{ secrets.PUBLORA_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python telegram_review.py

      - name: Save idea ledger state
        working-directory: .
        run: |
          git config user.name "OralCheck Bot"
          git config user.email "bot@oralcheck.org"
          git add oralcheck-agent/ideas.json
          git diff --staged --quiet || (git commit -m "chore: idea ledger [skip ci]" && git push)
