name: Diagnose Instagram Token

# Reports what the Instagram access token can and cannot do, so we can see why
# publishing returns "(#10) Application does not have permission". Prints no secrets.
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oralcheck-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx
      - name: Check Instagram token
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python check_ig.py
